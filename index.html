          <li class="chip chip-quantum">Quantum Native</li>

      <section id="quote-resilience" class="section quote">
        <blockquote class="quote-body">
          <p class="quote-original" lang="en">
            <span class="quote-word reveal" style="--i: 0">&quot;Resilience</span>
            <span class="quote-word reveal" style="--i: 1">matters</span>

            <span class="quote-word reveal" style="--i: 3">success.&quot;</span>
          </p>
          <p class="quote-translation">
            <span class="quote-word reveal" style="--i: 4">성공을</span>
            <span class="quote-word reveal" style="--i: 5">결정짓는</span>
            <span class="quote-word reveal" style="--i: 6">핵심은</span>
            <span class="quote-word reveal" style="--i: 7">결국</span>
            <span class="quote-word reveal" style="--i: 8">회복탄력성이다.</span>
          </p>
          <footer class="quote-source quote-word reveal" style="--i: 9">— Jensen Huang, NVIDIA</footer>
        </blockquote>
      </section>
      <section id="timeline" class="section"></section>
      <section id="numbers" class="section"></section>
      <section id="quote-environment" class="section quote">
        <blockquote class="quote-body">
          <p class="quote-original" lang="ko">
            <span class="quote-word reveal" style="--i: 0">&quot;의지를</span>
            <span class="quote-word reveal" style="--i: 1">믿지</span>

          </p>

            <span class="quote-word reveal" style="--i: 6">환경을</span>
          </p>
          <footer class="quote-source quote-word reveal" style="--i: 7">— 이동욱, 인프런 CTO</footer>
        </blockquote>

      <section id="liveboard" class="section"></section>
